name: mem0-dev

services:
  mem0:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8888:8000"
    env_file:
      - .env
    networks:
      - mem0_network
    volumes:
      - ./history:/app/history
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=
      - DASHBOARD_URL=http://localhost:3000
      - APP_DB_NAME=mem0_app
      - JWT_SECRET=${JWT_SECRET}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - MEM0_TELEMETRY=${MEM0_TELEMETRY:-true}

  postgres:
      image: pgvector/pgvector:pg17
      restart: on-failure
      shm_size: "128mb"
      networks:
        - mem0_network
      environment:
        - POSTGRES_USER=mem0
        - POSTGRES_PASSWORD=Mem0_S...026!
        - POSTGRES_DB=mem0
      healthcheck:
        test: ["CMD-SHELL", "pg_isready -q -d mem0 -U mem0"]
        interval: 5s
        timeout: 5s
        retries: 5
      volumes:
        - postgres_db:/var/lib/postgresql/data
        - ./init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      ports:
        - "8432:5432"

  mem0-dashboard:
    build:
      context: ../openmemory/ui
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    networks:
      - mem0_network
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8888
      - API_INTERNAL_URL=http://mem0:8000
      - NEXT_PUBLIC_INSTANCE_NAME=Mem0
    depends_on:
      mem0:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  postgres_db:

networks:
  mem0_network:
    driver: bridge
